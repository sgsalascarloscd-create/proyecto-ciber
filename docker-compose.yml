services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: incident-backend:local
    container_name: incident-backend
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: ${PORT:-8080}
      DB_PATH: /data/backend.db
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - api-data:/data
      - ./uploads:/app/uploads
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS
          "http://127.0.0.1:$${PORT:-8080}/api/v1/incidents" >/dev/null
          || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  api-data:
    name: incident-backend-data
